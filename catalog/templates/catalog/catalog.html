{% extends 'base.html' %}
{% load static %}
{% block body %}

<div class="container-xxl py-5">
    <div class="container">

        <div class="text-center mx-auto mb-5 catalog-header" style="max-width:600px;">
            <h4 class="section-title">Our Catalog</h4>
            <h1 class="display-5 mb-3 catalog-main-title">Explore Our Product Catalogs</h1>
            <p class="text-muted catalog-subtitle">
                Browse our latest product collections and specifications.
            </p>
        </div>

        <div class="row g-4">

        {% for catalog in catalogs %}
        <div class="col-lg-4 col-md-6">

            <div class="card catalog-card border-0 shadow-sm h-100">

                <div class="catalog-img">
                    <img src="{{ catalog.image.url }}" class="card-img-top">
                </div>

                <div class="card-body text-center">

                    <h4 class="mb-3 catalog-title">{{ catalog.title }}</h4>

                    <div class="d-flex justify-content-center gap-2">

                        <a href="{{ catalog.drive_link }}" target="_blank" 
                           class="btn btn-primary catalog-btn">
                           <i class="fa fa-eye me-2"></i>Preview
                        </a>

                    </div>

                </div>

            </div>

        </div>
        {% empty %}

        <div class="col-12 text-center">
            <h4>No catalogs available yet</h4>
        </div>

        {% endfor %}

        </div>

    </div>
</div>

<style>

.catalog-main-title{
    font-weight:800;
}

.catalog-subtitle{
    font-weight:500;
}

.catalog-title{
    font-weight:700;
}

.catalog-btn{
    font-weight:600;
}

.catalog-card{
    transition: all .35s ease;
    border-radius:12px;
    overflow:hidden;
}

.catalog-card:hover{
    transform: translateY(-8px);
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.catalog-img{
    overflow:hidden;
}

.catalog-img img{
    height:260px;
    width:100%;
    object-fit:cover;
    transition:transform .4s;
}

.catalog-card:hover img{
    transform:scale(1.08);
}

</style>

{% endblock body %}
